services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Quiz Backend
      ENVIRONMENT: local
      DATABASE_URL: postgresql+asyncpg://quiz:quiz@db:5432/quiz
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quiz
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d quiz"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

